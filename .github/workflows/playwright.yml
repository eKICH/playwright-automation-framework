name: Parabank PlayWright Automation Framework Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run_tests
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME_VALID: ${{ secrets.USERNAME_VALID }}
          PASSWORD_VALID: ${{ secrets.PASSWORD_VALID }}
          USERNAME_INVALID: ${{ secrets.USERNAME_INVALID }}
          PASSWORD_INVALID: ${{ secrets.PASSWORD_INVALID }}
          USERNAME_EMPTY: ''
          PASSWORD_EMPTY: ''
        run: npm run test:regression

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: reports/${{ github.run_id }}

      - name: Parse test results
        if: always()
        id: results
        run: |
          PASSED=0
          FAILED=0
          BROKEN=0
          MESSAGE=""
          WHATSAPP_MESSAGE=""

          for file in allure-results/*-result.json; do
            if [ -f "$file" ]; then
              NAME=$(jq -r '.name' "$file")
              STATUS=$(jq -r '.status' "$file")

              case $STATUS in
                passed)  EMOJI="✅"; PASSED=$((PASSED + 1));;
                failed)  EMOJI="❌"; FAILED=$((FAILED + 1));;
                broken)  EMOJI="⚠️"; BROKEN=$((BROKEN + 1));;
                *)       EMOJI="⏭️";;
              esac

              MESSAGE="$MESSAGE<br>$EMOJI $NAME"
              WHATSAPP_MESSAGE="$WHATSAPP_MESSAGE$EMOJI $NAME%0A"
            fi
          done

          TOTAL=$((PASSED + FAILED + BROKEN))
          REPORT_URL="https://ekich.github.io/playwright-automation-framework/reports/${{ github.run_id }}"

          # Determine status colour and label based on results
          if [ "$FAILED" -gt 0 ] && [ "$BROKEN" -gt 0 ]; then
            STATUS_COLOR="#e74c3c"
            STATUS_LABEL="❌ Some Tests Failed and Broken"
          elif [ "$FAILED" -gt 0 ]; then
            STATUS_COLOR="#e74c3c"
            STATUS_LABEL="❌ Some Tests Failed"
          elif [ "$BROKEN" -gt 0 ]; then
            STATUS_COLOR="#f39c12"
            STATUS_LABEL="⚠️ Some Tests Broken"
          else
            STATUS_COLOR="#27ae60"
            STATUS_LABEL="✅ All Tests Passed"
          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          echo "whatsapp_message=$WHATSAPP_MESSAGE" >> $GITHUB_OUTPUT
          echo "whatsapp_summary=Total:+$TOTAL+Passed:+$PASSED+Failed:+$FAILED" >> $GITHUB_OUTPUT
          echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT
          echo "status_color=$STATUS_COLOR" >> $GITHUB_OUTPUT
          echo "status_label=$STATUS_LABEL" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ job.status }}] Parabank PlayWright Automation Framework Tests - ${{ github.ref_name }}"
          html_body: |
            <html>
            <body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
              <div style="max-width: 700px; margin: auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

                <!-- Header -->
                <div style="background-color: #1a1a2e; padding: 24px 32px;">
                  <h1 style="color: #ffffff; margin: 0; font-size: 20px;">🎭 Parabank Playwright Automation</h1>
                  <p style="color: #a0a0b0; margin: 6px 0 0 0; font-size: 14px;">Test Execution Report</p>
                </div>

                <!-- Status Banner -->
                <div style="background-color: ${{ steps.results.outputs.status_color }}; padding: 12px 32px;">
                  <p style="color: #ffffff; margin: 0; font-size: 16px; font-weight: bold;">
                    ${{ steps.results.outputs.status_label }}
                  </p>
                </div>

                <!-- Run Details -->
                <div style="padding: 24px 32px;">
                  <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                    <tr style="border-bottom: 1px solid #eeeeee;">
                      <td style="padding: 10px 0; color: #666666; width: 140px;">Branch</td>
                      <td style="padding: 10px 0; font-weight: bold;">${{ github.ref_name }}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #eeeeee;">
                      <td style="padding: 10px 0; color: #666666;">Status</td>
                      <td style="padding: 10px 0; font-weight: bold;">${{ job.status }}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #eeeeee;">
                      <td style="padding: 10px 0; color: #666666;">Triggered By</td>
                      <td style="padding: 10px 0; font-weight: bold;">${{ github.event_name }}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #eeeeee;">
                      <td style="padding: 10px 0; color: #666666;">Actor</td>
                      <td style="padding: 10px 0; font-weight: bold;">${{ github.actor }}</td>
                    </tr>
                  </table>
                </div>

                <!-- Summary Cards -->
                <div style="padding: 0 32px 24px 32px;">
                  <table style="width: 100%; border-collapse: collapse; text-align: center;">
                    <tr>
                      <td style="background-color: #eafaf1; border-radius: 8px; padding: 16px; width: 33%;">
                        <p style="margin: 0; font-size: 28px; font-weight: bold; color: #27ae60;">${{ steps.results.outputs.passed }}</p>
                        <p style="margin: 4px 0 0 0; font-size: 13px; color: #666666;">Passed</p>
                      </td>
                      <td style="width: 16px;"></td>
                      <td style="background-color: #fdf2f2; border-radius: 8px; padding: 16px; width: 33%;">
                        <p style="margin: 0; font-size: 28px; font-weight: bold; color: #e74c3c;">${{ steps.results.outputs.failed }}</p>
                        <p style="margin: 4px 0 0 0; font-size: 13px; color: #666666;">Failed</p>
                      </td>
                      <td style="width: 16px;"></td>
                      <td style="background-color: #fef9e7; border-radius: 8px; padding: 16px; width: 33%;">
                        <p style="margin: 0; font-size: 28px; font-weight: bold; color: #f39c12;">${{ steps.results.outputs.broken }}</p>
                        <p style="margin: 4px 0 0 0; font-size: 13px; color: #666666;">Broken</p>
                      </td>
                    </tr>
                  </table>
                </div>

                <!-- Test Results -->
                <div style="padding: 0 32px 24px 32px;">
                  <h3 style="font-size: 15px; color: #1a1a2e; margin: 0 0 12px 0; border-bottom: 2px solid #1a1a2e; padding-bottom: 8px;">Test Results</h3>
                  <div style="font-size: 13px; line-height: 2; color: #333333;">
                    ${{ steps.results.outputs.message }}
                  </div>
                </div>

                <!-- CTA Buttons -->
                <div style="padding: 0 32px 32px 32px; text-align: center;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="background-color: #1a1a2e; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; margin-right: 12px;">
                    View Run
                  </a>
                  <a href="https://ekich.github.io/playwright-automation-framework/reports/${{ github.run_id }}"
                     style="background-color: #27ae60; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold;">
                    View Allure Report
                  </a>
                </div>

                <!-- Footer -->
                <div style="background-color: #f4f4f4; padding: 16px 32px; text-align: center;">
                  <p style="margin: 0; font-size: 12px; color: #999999;">Sent by: Chris - TAE</p>
                </div>

              </div>
            </body>
            </html>
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Send WhatsApp notification
        if: always()
        run: |
          curl --globoff -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.WHATSAPP_PHONE }}&text=Parabank+Playwright+Results%0ABranch:+${{ github.ref_name }}%0AStatus:+${{ job.status }}%0A${{ steps.results.outputs.whatsapp_summary }}%0AReport:+https://ekich.github.io/playwright-automation-framework/reports/${{ github.run_id }}%0ARun:+${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}&apikey=${{ secrets.WHATSAPP_API_KEY }}"