name: Parabank PlayWright Automation Framework Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run_tests
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME_VALID: ${{ secrets.USERNAME_VALID }}
          PASSWORD_VALID: ${{ secrets.PASSWORD_VALID }}
          USERNAME_INVALID: ${{ secrets.USERNAME_INVALID }}
          PASSWORD_INVALID: ${{ secrets.PASSWORD_INVALID }}
          USERNAME_EMPTY: ''
          PASSWORD_EMPTY: ''
        run: npm run test:regression

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Parse test results
        if: always()
        id: results
        run: |
          PASSED=0
          FAILED=0
          BROKEN=0
          MESSAGE=""

          for file in allure-results/*-result.json; do
            if [ -f "$file" ]; then
              NAME=$(jq -r '.name' "$file")
              STATUS=$(jq -r '.status' "$file")

              case $STATUS in
                passed)  EMOJI="✅"; PASSED=$((PASSED + 1));;
                failed)  EMOJI="❌"; FAILED=$((FAILED + 1));;
                broken)  EMOJI="⚠️"; BROKEN=$((BROKEN + 1));;
                *)       EMOJI="⏭️";;
              esac

              MESSAGE="$MESSAGE$EMOJI $NAME%0A"
            fi
          done

          TOTAL=$((PASSED + FAILED + BROKEN))
          SUMMARY="Total:+$TOTAL+|+✅+$PASSED+|+❌+$FAILED+|+⚠️+$BROKEN"

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ job.status }}] Parabank PlayWright Automation Framework Tests - ${{ github.ref_name }}"
          html_body: |
            <p>Hi Engineering,</p>
            <p>Here are the results for the latest Parabank PlayWright Automation Framework Test run:</p>
            <table>
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Status</b></td><td>${{ job.status }}</td></tr>
              <tr><td><b>Triggered</b></td><td>${{ github.event_name }}</td></tr>
              <tr><td><b>Passed</b></td><td>${{ steps.results.outputs.passed }}</td></tr>
              <tr><td><b>Failed</b></td><td>${{ steps.results.outputs.failed }}</td></tr>
            </table>
            <br>
            <b>Test Results:</b>
            <pre>${{ steps.results.outputs.message }}</pre>
            <br>
            <p><b>Run URL:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></p>
            <p>Download the Allure report from the Run URL above under Artifacts.</p>
            <br>
            <p>Regards,<br>Chris - TAE</p>
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Send WhatsApp notification
        if: always()
        run: |
          curl --globoff -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.WHATSAPP_PHONE }}&text=🎭+Parabank+Playwright+Results%0ABranch:+${{ github.ref_name }}%0AStatus:+${{ job.status }}%0A${{ steps.results.outputs.summary }}%0ASee+email+for+full+details.%0ARun:+${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}&apikey=${{ secrets.WHATSAPP_API_KEY }}"